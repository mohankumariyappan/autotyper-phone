<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>AutoTyper — Phone Sync</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d1a; --card: #151526; --border: #252540;
    --purple: #8b5cf6; --purple2: #a78bfa;
    --green: #51cf66; --red: #ff6b6b; --yellow: #fcc419;
    --text: #eaeaea; --muted: #8a8a9a;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100dvh; display: flex; flex-direction: column;
    align-items: center; padding: 24px 16px 40px;
  }
  header {
    width: 100%; max-width: 420px; margin-bottom: 28px;
    display: flex; align-items: center; gap: 12px;
  }
  .logo {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, #5b4fe0, #ff6b81);
    border-radius: 10px; display: flex; align-items: center;
    justify-content: center; font-size: 20px;
  }
  .header-text h1 { font-size: 20px; font-weight: 700; }
  .header-text p  { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .card {
    width: 100%; max-width: 420px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 20px; margin-bottom: 14px;
  }
  .card-title {
    font-size: 11px; font-weight: 700; letter-spacing: 0.8px;
    text-transform: uppercase; color: var(--muted); margin-bottom: 14px;
  }
  .id-row { display: flex; gap: 10px; align-items: center; }
  input[type="text"] {
    flex: 1; background: #0f0f1c; border: 1px solid var(--border);
    border-radius: 10px; padding: 13px 16px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none;
    transition: border-color .2s;
  }
  input[type="text"]:focus { border-color: var(--purple); }
  input[type="text"]::placeholder { color: #383d60; }
  .connect-btn {
    background: var(--purple); border: none; border-radius: 10px;
    padding: 13px 18px; color: white; font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 700; cursor: pointer; white-space: nowrap;
    transition: background .2s;
  }
  .connect-btn:active { background: #7c3aed; }
  .status-pill {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 7px 14px; border-radius: 99px; font-size: 13px;
    font-weight: 500; margin-top: 12px; transition: all .3s;
  }
  .status-pill .dot { width: 8px; height: 8px; border-radius: 50%; }
  .status-pill.idle      { background: rgba(138,138,154,.1); color: var(--muted); }
  .status-pill.idle .dot { background: var(--muted); }
  .status-pill.ok        { background: rgba(81,207,102,.1); color: var(--green); }
  .status-pill.ok .dot   { background: var(--green); animation: pulse 1.5s infinite; }
  .status-pill.err       { background: rgba(255,107,107,.1); color: var(--red); }
  .status-pill.err .dot  { background: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  textarea {
    width: 100%; min-height: 160px; background: #0f0f1c;
    border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 16px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    line-height: 1.6; resize: vertical; outline: none;
    transition: border-color .2s;
  }
  textarea:focus { border-color: var(--purple); }
  textarea::placeholder { color: #383d60; }
  .char-count { font-size: 11px; color: var(--muted); text-align: right; margin-top: 6px; }

  .send-btn {
    width: 100%; background: linear-gradient(135deg, #5b4fe0, #8b5cf6);
    border: none; border-radius: 12px; padding: 16px; color: white;
    font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 700;
    cursor: pointer; margin-top: 14px; transition: opacity .2s, transform .1s;
  }
  .send-btn:active  { transform: scale(.98); opacity: .9; }
  .send-btn:disabled { background: #252540; color: #4a4a6a; cursor: not-allowed; transform: none; }
  .clear-btn {
    width: 100%; background: transparent; border: 1px solid var(--border);
    border-radius: 12px; padding: 12px; color: var(--muted);
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    cursor: pointer; margin-top: 8px; transition: border-color .2s, color .2s;
  }
  .clear-btn:active { border-color: var(--purple); color: var(--purple2); }

  .history-item {
    padding: 10px 12px; background: #0f0f1c; border-radius: 8px;
    font-size: 13px; color: var(--muted); margin-bottom: 8px;
    border-left: 2px solid var(--purple); white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; cursor: pointer;
  }
  .history-item:active { opacity: .7; }
  .history-empty { font-size: 13px; color: #383d60; text-align: center; padding: 12px 0; }

  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1e1e35; border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 22px;
    font-size: 14px; font-weight: 500;
    transition: transform .3s cubic-bezier(.34,1.56,.64,1);
    z-index: 99; white-space: nowrap; pointer-events: none;
  }
  .toast.show    { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: rgba(81,207,102,.4); color: var(--green); }
  .toast.error   { border-color: rgba(255,107,107,.4); color: var(--red); }
</style>
</head>
<body>

<header>
  <div class="logo">⌨</div>
  <div class="header-text">
    <h1>AutoTyper</h1>
    <p>Phone → PC sync</p>
  </div>
</header>

<!-- Connect -->
<div class="card">
  <div class="card-title">Connect to PC</div>
  <div class="id-row">
    <input type="text" id="sessionInput" placeholder="Enter Session ID (e.g. ab3k9xz2)"
           autocomplete="off" autocapitalize="none" spellcheck="false"/>
    <button class="connect-btn" onclick="connect()">Connect</button>
  </div>
  <div class="status-pill idle" id="statusPill">
    <span class="dot"></span>
    <span id="statusText">Not connected</span>
  </div>
</div>

<!-- Send text -->
<div class="card">
  <div class="card-title">Send Text to PC</div>
  <textarea id="textArea" placeholder="Paste or type your code / text here…" oninput="updateCount()"></textarea>
  <div class="char-count"><span id="charCount">0</span> characters</div>
  <button class="send-btn" id="sendBtn" onclick="sendText()" disabled>Send to PC →</button>
  <button class="clear-btn" onclick="clearText()">Clear</button>
</div>

<!-- History -->
<div class="card">
  <div class="card-title">Recent Sends</div>
  <div id="historyList"><div class="history-empty">Nothing sent yet</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
  const RELAY = 'https://web-production-e5693.up.railway.app'; // <-- replace after deploying
  let sessionId = '';
  let history = JSON.parse(localStorage.getItem('at_history') || '[]');

  // Restore last session
  const saved = localStorage.getItem('at_session');
  if (saved) { document.getElementById('sessionInput').value = saved; connect(true); }
  renderHistory();

  function connect(silent = false) {
    const val = document.getElementById('sessionInput').value.trim().toLowerCase();
    if (!val) { showToast('Enter a Session ID first', 'error'); return; }
    sessionId = val;
    localStorage.setItem('at_session', val);
    setPill('ok', `Connected — ${val}`);
    document.getElementById('sendBtn').disabled = false;
    if (!silent) showToast('Connected!', 'success');
  }

  async function sendText() {
    const text = document.getElementById('textArea').value.trim();
    if (!text)      { showToast('Text is empty', 'error'); return; }
    if (!sessionId) { showToast('Connect first', 'error'); return; }

    const btn = document.getElementById('sendBtn');
    btn.textContent = 'Sending…'; btn.disabled = true;

    try {
      const res = await fetch(`${RELAY}/send/${sessionId}`, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: text
      });
      if (res.ok) {
        showToast(`Sent ${text.length} chars ✓`, 'success');
        addHistory(text);
      } else {
        showToast('Server error — try again', 'error');
        setPill('err', 'Send failed');
      }
    } catch (e) {
      showToast('Network error', 'error');
      setPill('err', 'No connection');
    } finally {
      btn.textContent = 'Send to PC →'; btn.disabled = false;
    }
  }

  function clearText() {
    document.getElementById('textArea').value = '';
    updateCount();
  }
  function updateCount() {
    document.getElementById('charCount').textContent =
      document.getElementById('textArea').value.length;
  }
  function setPill(state, msg) {
    document.getElementById('statusPill').className = `status-pill ${state}`;
    document.getElementById('statusText').textContent = msg;
  }
  function addHistory(text) {
    const preview = text.length > 60 ? text.slice(0, 60) + '…' : text;
    history.unshift({ preview, full: text, time: new Date().toLocaleTimeString() });
    if (history.length > 10) history.pop();
    localStorage.setItem('at_history', JSON.stringify(history));
    renderHistory();
  }
  function renderHistory() {
    const el = document.getElementById('historyList');
    if (!history.length) { el.innerHTML = '<div class="history-empty">Nothing sent yet</div>'; return; }
    el.innerHTML = history.map((h, i) =>
      `<div class="history-item" onclick="reuseHistory(${i})" title="Tap to reuse">
        <span style="color:#8b5cf6;font-size:11px;">${h.time}</span>  ${h.preview}
      </div>`
    ).join('');
  }
  function reuseHistory(i) {
    document.getElementById('textArea').value = history[i].full;
    updateCount();
    showToast('Text loaded — tap Send', 'success');
  }
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast ${type} show`;
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.className = `toast ${type}`, 2500);
  }
</script>
</body>
</html>
